# It is reusable workflow that can be called in other workflow
# Purpose :
# Unless terraform Init, Validate, Plan checks pass, the commit to the target branch will not happen or the PR will not pass & cannot be merged to the destination branch.
# Unless Checkov, Trivy code scan checks pass, the commit to the target branch will not happen or the PR will not pass & cannot be merged to the destination branch.
# If there are no examples/main.tf file in the repo, commit to the target branch or the PR will not pass & cannot be merged to the destination branch.
# If there are no README.md file in the root of the repo, commit to the target branch or the PR will not pass & cannot be merged to the destination branch.
# If any of the above four checks fail, the commit to the target branch or the PR will not pass & cannot be merged to the destination branch

name: iac-code-quality-checks
run-name: ${{ github.actor }} has triggered the GitHub Actions
# Controls when the action will run. Invokes the workflow on push events on all branches except for the main/master branches and on pull requests
on:
  workflow_call:
    secrets:
      TF_API_TOKEN:
        required: true
  # Triggers the workflow on push or pull request events
  push:
    branches-ignore:
      - "main"
      - "master"
    paths-ignore:
      - "**/README.md"
  pull_request:
    branches: ["feature/*", "develop", "release", "master"]
    types: [assigned, opened, reopened, edited, ready_for_review, synchronize]
env:
  tfcode_path: "."
  # tfc_hostname: "app.terraform.io"
  # tfc_organisation: "cloud-infra-dev"
  # tfc_workspace: "testing-terraform-aws-modules"

jobs:
  check-required-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check required files exist
        run: |
          missing=0
          if [ ! -f "examples/main.tf" ]; then
            echo "::error::Missing required file: examples/main.tf"
            missing=1
          fi
          if [ ! -f "README.md" ]; then
            echo "::error::Missing required file: README.md"
            missing=1
          fi
          if [ ! -f "trivy.yaml" ]; then
            echo "::error::Missing required file: trivy.yaml"
            missing=1
          fi
          if [ ! -f ".tflint.hcl" ]; then
            echo "::error::Missing required file: .tflint.hcl"
            missing=1
          fi
          exit $missing

  checkov-scan:
    runs-on: ubuntu-latest
    needs: check-required-files
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Checkov scan
        uses: bridgecrewio/checkov-action@v12.3092.0
        with:
          directory: ${{ env.tfcode_path }}
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,results.sarif
          soft_fail: false
        continue-on-error: false

      # - name: Upload Checkov SARIF report
      #   if: always()
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: results.sarif
      #     category: checkov

  trivy-scan:
    runs-on: ubuntu-latest
    needs: check-required-files
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Trivy config scan for Terraform
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "config"
          ignore-unfixed: true
          scan-ref: ${{ env.tfcode_path }}
          format: "table"
          severity: "CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN"
          exit-code: "1"
          trivy-config: trivy.yaml

      - name: Fail on Trivy misconfiguration findings
        if: failure()
        run: |
          echo "::error::Trivy detected misconfiguration errors. Review the scan output above."
          exit 1

  tflint-scan:
    runs-on: ubuntu-latest
    needs: check-required-files
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6.2.2
        with:
          tflint_version: v0.61.0

      - name: Run TFLint
        run: |
          tflint --init
          tflint --chdir=${{ env.tfcode_path }} --format=compact
        continue-on-error: false

  scan-results:
    runs-on: ubuntu-latest
    needs: [checkov-scan, trivy-scan, tflint-scan]
    if: always()
    steps:
      - name: Scan Results Summary
        run: |
          checkov="${{ needs.checkov-scan.result }}"
          trivy="${{ needs.trivy-scan.result }}"
          tflint="${{ needs.tflint-scan.result }}"

          RESET="\e[0m"
          BOLD="\e[1m"
          CYAN="\e[36m"
          GREEN="\e[32m"
          RED="\e[31m"
          WHITE="\e[97m"
          B="${BOLD}${CYAN}"
          T="${BOLD}${WHITE}"

          # col widths (pure ASCII, no emoji inside printf fields)
          # col1 = 16 chars, col2 = 16 chars
          row() {
            local label="$1" result="$2"
            local icon color
            if [[ "$result" == "success" ]]; then icon="PASSED"; color="${BOLD}${GREEN}"
            else                                   icon="FAILED"; color="${BOLD}${RED}"
            fi
            printf "${B}║${RESET} ${T}%-16s${RESET} ${B}║${RESET} ${color}%16s${RESET} ${B}║${RESET}\n" \
              "$label" "$icon"
          }

          echo ""
          echo -e "${B}╔══════════════════╦══════════════════╗${RESET}"
          printf  "${B}║${RESET} ${T}%-35s${RESET} ${B}║${RESET}\n" "  🔍 IaC Security Scan Summary"
          echo -e "${B}╠══════════════════╦══════════════════╣${RESET}"
          printf  "${B}║${RESET} ${T}%-16s${RESET} ${B}║${RESET} ${T}%-16s${RESET} ${B}║${RESET}\n" "  SCAN TOOL" "  RESULT"
          echo -e "${B}╠══════════════════╬══════════════════╣${RESET}"
          row "  🛡  Checkov" "  $checkov"
          echo -e "${B}╠══════════════════╬══════════════════╣${RESET}"
          row "  🔬 Trivy" "  $trivy"
          echo -e "${B}╠══════════════════╬══════════════════╣${RESET}"
          row "  🧹 TFLint" "  $tflint"
          echo -e "${B}╠══════════════════╩══════════════════╣${RESET}"

          if [[ "$checkov" != "success" || "$trivy" != "success" || "$tflint" != "success" ]]; then
            printf "${B}║${RESET} ${BOLD}${RED}%-35s${RESET} ${B}║${RESET}\n" "  ⛔ Overall : FAILED"
            echo -e "${B}╚═════════════════════════════════════╝${RESET}"
            echo ""
            echo "::error::One or more scans failed. checkov=$checkov, trivy=$trivy, tflint=$tflint"
            exit 1
          fi

          printf "${B}║${RESET} ${BOLD}${GREEN}%-35s${RESET} ${B}║${RESET}\n" "  🎉 Overall : ALL SCANS PASSED"
          echo -e "${B}╚═════════════════════════════════════╝${RESET}"
          echo ""

